<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>内购产品列表 · 现货当日可取</title>
  <link rel="stylesheet" href="css/style.css?v=20260605g">
</head>
<body>

  <!-- 页面标题区域 -->
  <header class="page-header page-header--showcase">
    <div class="container">
      <h1>内购产品列表</h1>
      <p class="page-header-subtitle">现货当日可取，预约留货不付款 · 拿货 19 楼沿指示牌找王一凡</p>
    </div>
  </header>

  <!-- 主内容区域 -->
  <main class="container">
    <!-- 商品卡片网格 -->
    <div id="product-grid" class="product-grid"></div>

    <!-- 暂无商品提示（默认隐藏） -->
    <div id="empty-state" class="empty-state hidden">暂无商品</div>

    <!-- 加载失败提示（默认隐藏） -->
    <div id="error-state" class="empty-state hidden">加载失败，请刷新页面</div>

    <!-- 抽奖（页面最下方） -->
    <section class="lottery-section" id="lottery-section">
      <div class="lottery-banner">
        <h2>内购幸运抽奖</h2>
        <p class="lottery-intro">中奖率约 <strong>20%</strong>（5 次约中 1 次），每台电脑仅限 1 次 · 仅限 Windows · 奖品抽完即止 · 未中奖送 <strong>满5减0.5</strong> 优惠券</p>
        <div id="lottery-prize-stock" class="lottery-prize-stock"></div>
        <button type="button" id="lottery-draw-btn" class="btn btn-lottery" onclick="performLotteryDraw()">立即抽奖</button>
        <p id="lottery-status-msg" class="lottery-status-msg"></p>
      </div>
      <div class="lottery-winners-public">
        <h3>抽奖公示</h3>
        <div id="lottery-winners-list" class="lottery-winners-list"></div>
        <div id="lottery-winners-empty" class="empty-state">暂无公示记录</div>
      </div>
    </section>

    <!-- 商品大图浏览 -->
    <div id="gallery-modal" class="gallery-overlay hidden" role="dialog" aria-modal="true" aria-label="商品图片">
      <button type="button" class="gallery-close" onclick="closeImageGallery()" aria-label="关闭">&times;</button>
      <div class="gallery-main" onclick="event.stopPropagation()">
        <button type="button" class="gallery-nav gallery-prev" onclick="galleryPrev()" aria-label="上一张">&#8249;</button>
        <img id="gallery-main-image" class="gallery-main-image" src="" alt="">
        <button type="button" class="gallery-nav gallery-next" onclick="galleryNext()" aria-label="下一张">&#8250;</button>
      </div>
      <p id="gallery-caption" class="gallery-caption"></p>
      <div id="gallery-thumbs" class="gallery-thumbs"></div>
    </div>

    <!-- 购买模态框 -->
    <div id="purchase-modal" class="modal-overlay hidden">
      <div class="modal-box">
        <div class="modal-header">
          <h3>预约留货（不付款，到货再付）</h3>
          <button class="modal-close" onclick="closePurchaseModal()">&times;</button>
        </div>
        <div class="modal-body">
          <div class="modal-product-name" id="modal-product-name"></div>
          <input type="hidden" id="purchase-product-id">
          <div class="form-group">
            <label>预约数量</label>
            <input type="number" id="purchase-quantity" value="1" min="1">
          </div>
          <div id="purchase-saved-name-tip" class="purchase-saved-name-tip hidden">
            将使用姓名：<strong id="purchase-saved-name-display"></strong>
            <button type="button" class="btn-link" onclick="useDifferentBuyerName()">更换姓名</button>
          </div>
          <div class="form-group" id="purchase-buyer-group">
            <label>预约人姓名<span class="required">*</span></label>
            <input type="text" id="purchase-buyer" placeholder="请填写您的姓名">
            <span class="field-error" id="buyer-error"></span>
          </div>
          <div class="form-group">
            <label>备注（可备注规格或者需求）</label>
            <input type="text" id="purchase-remark" placeholder="选填">
          </div>
          <div id="purchase-error" class="message message-error"></div>
          <div id="purchase-message" class="message message-success"></div>
        </div>
        <div class="modal-footer">
          <button id="purchase-submit-btn" class="btn btn-primary" onclick="submitPurchase()">帮我留一件</button>
        </div>
      </div>
    </div>

    <!-- 中奖弹窗 -->
    <div id="lottery-win-modal" class="modal-overlay hidden">
      <div class="modal-box lottery-modal-box">
        <div class="modal-header">
          <h3>🎉 恭喜你中奖！</h3>
          <button class="modal-close" onclick="closeLotteryWinModal()">&times;</button>
        </div>
        <div class="modal-body">
          <p class="lottery-win-prize" id="lottery-win-prize-text"></p>
          <p class="lottery-win-hint">请填写姓名完成登记，便于领取奖品</p>
          <div class="form-group">
            <label>您的姓名<span class="required">*</span></label>
            <input type="text" id="lottery-winner-name" placeholder="请填写真实姓名">
            <span class="field-error" id="lottery-winner-error"></span>
          </div>
        </div>
        <div class="modal-footer">
          <button id="lottery-winner-submit-btn" class="btn btn-primary" onclick="submitLotteryWinnerName()">确认登记</button>
        </div>
      </div>
    </div>

    <!-- 未中奖弹窗（安慰券） -->
    <div id="lottery-lose-modal" class="modal-overlay hidden">
      <div class="modal-box lottery-modal-box">
        <div class="modal-header">
          <h3>送您一张优惠券</h3>
          <button class="modal-close" onclick="closeLotteryLoseModal()">&times;</button>
        </div>
        <div class="modal-body">
          <p class="lottery-lose-text">虽未中奖，感谢您的参与！</p>
          <p class="lottery-consolation-prize" id="lottery-consolation-text">满5减0.5</p>
          <p class="lottery-win-hint">请填写姓名登记优惠券，便于领取使用</p>
          <div class="form-group">
            <label>您的姓名<span class="required">*</span></label>
            <input type="text" id="lottery-lose-name" placeholder="请填写真实姓名">
            <span class="field-error" id="lottery-lose-error"></span>
          </div>
        </div>
        <div class="modal-footer">
          <button id="lottery-lose-submit-btn" class="btn btn-primary" onclick="submitLotteryLoseRegistration()">确认登记优惠券</button>
        </div>
      </div>
    </div>
  </main>

  <script src="js/config.js?v=20260605g"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js?v=20260605g"></script>
  <script src="js/product-images.js?v=20260605g"></script>
  <script src="js/browse-log.js?v=20260605g"></script>
  <script src="js/app.js?v=20260605g"></script>
  <script src="js/lottery.js?v=20260605g"></script>
</body>
</html>
